apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyaya-app
  namespace: nyaya-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nyaya-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: nyaya-app
    spec:
      containers:
        - name: nyaya-app
          image: YOUR_DOCKERHUB/nyaya-ai:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: nyaya-config
            - secretRef:
                name: nyaya-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nyaya-service
  namespace: nyaya-ai
spec:
  selector:
    app: nyaya-app
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nyaya-hpa
  namespace: nyaya-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nyaya-app
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
